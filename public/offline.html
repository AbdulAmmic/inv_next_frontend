<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d4940a" />
    <title>Tuhanas Inventory Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 520px;
        width: 100%;
        background: #ffffff;
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        border: 1px solid #e2e8f0;
        padding: 2.5rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 2rem;
        color: #1e293b;
      }
      p {
        margin: 0 0 1.5rem;
        line-height: 1.7;
        color: #475569;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.5rem;
        border-radius: 9999px;
        background: #d4960d;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Tuhanas Inventory is available offline once the app has been loaded.
        Refreshing the page now will use cached app assets and local data when available.
      </p>
      <a href="/">Go back to the app</a>
    </div>
  </body>
</html>
